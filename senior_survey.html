<!DOCTYPE html>
<html>
<head>
    <title>Senior Survey</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

<h1>Senior Admission Survey</h1>

<form method="POST" action="/submit_senior">

<label>Year</label>
<input type="number" name="year" required><br>

<label>Your GPA</label>
<input type="number" step="0.01" name="gpa" required><br>

<label>Preferred Department</label>
<select name="preferred_department" required>
<option>Computer Science</option>
<option>Engineering</option>
<option>Information System</option>
<option>Biology</option>
<option>Mathematics</option>
</select><br>

<label>Department Admitted To</label>
<select name="admitted_department" required>
<option>Computer Science</option>
<option>Engineering</option>
<option>Information System</option>
<option>Biology</option>
<option>Mathematics</option>
</select><br>

<label>Seats Available</label>
<input type="number" name="seats" required><br>

<label>Total Applicants</label>
<input type="number" name="total_applicants" required>

<button type="submit">Submit</button>

</form>

</body>
</html>
